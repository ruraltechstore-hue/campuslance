<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Confirm your email</title>
  </head>
  <body style="font-family: system-ui, sans-serif; line-height: 1.5; color: #111; max-width: 32rem; margin: 0 auto; padding: 1.5rem">
    <h2 style="margin-top: 0">Confirm your email</h2>
    <p>Tap the button below to finish setting up your CampusLance account. This link expires soon.</p>
    <p style="margin: 1.5rem 0">
      <a
        href="{{ .ConfirmationURL }}"
        style="display: inline-block; padding: 0.75rem 1.25rem; background: #111; color: #fff; text-decoration: none; border-radius: 0.375rem; font-weight: 600"
        >Confirm email</a
      >
    </p>
    <p style="color: #555; font-size: 0.875rem">If you did not request this, you can ignore this message. Do not share this link.</p>
    <p style="color: #555; font-size: 0.875rem">Account: {{ .Email }}</p>
  </body>
</html>
